<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // Redirect all 404s to the index.html
      const path = window.location.pathname;
      const redirect = path + window.location.search + window.location.hash;
      // Remove the base path and use the root index
      sessionStorage.redirect = redirect.replace('/Azdineco', '');
      window.location.href = '/Azdineco/index.html';
    </script>
  </head>
  <body></body>
</html>
